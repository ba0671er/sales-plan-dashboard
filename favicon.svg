  <rect x="18" y="42" width="34" height="2" rx="1" fill="#ffffff" opacity="0.85"/>
  <circle cx="14" cy="49" r="1.6" fill="#f59e0b"/>
  <rect x="18" y="48" width="24" height="2" rx="1" fill="#ffffff" opacity="0.75"/>
  <circle cx="14" cy="55" r="1.6" fill="#ef4444"/>
